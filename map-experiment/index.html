<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TX Zipcodes</title>
  </head>
  <body>
    <div id="controls">
      <div class="control-row">
        <label>Candidate 1:
          <select id="candidate1-select"></select>
        </label>
      </div>
      <div class="control-row">
        <label>Candidate 2:
          <select id="candidate2-select">
            <option value="">None (single candidate)</option>
          </select>
        </label>
      </div>
      <div class="control-row">
        <label>Metric:
          <select id="metric-select">
            <option value="total_amount">$ Raised</option>
            <option value="num_contributions"># Contributions</option>
            <option value="per_contributor">$/Contributor</option>
          </select>
        </label>
      </div>
    </div>
    <div id="legend"></div>
    <div id="map"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
